<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais Você</title>
    <link rel="stylesheet" href="mais.css">
</head>

<body>
    <div class="caixa">
        <img src="MAIS_VOCE_2009_2.webp" alt="Logo + VC" class="logo">

        <img src="maisvoce.jpg" alt="Foto do Programa" class="foto-topo">

        <h1>Café da Manhã no Mais Você</h1>

        <p class="texto">
            Faça um cadastro e venha tomar café da manhã com Ana Maria ao vivo.
        </p>

        <div class="historia">
            <h2>Sobre o Programa</h2>
            <p>O Mais Você é um programa de variedades da tv brasileira.
                Marcado por culinaria, entrevistas e conversa leve com o público.
            </p>
        </div>
        <div class="bloco">
            <div class="lado-form">
                <form id="formulario">
                    <input type="text" id="nome" name="nome" placeholder="Nome">
                    <input type="text" id="telefone" name="telefone" placeholder="Telefone">
                    <input type="password" id="senha" name="senha" placeholder="Senha">
                    <input type="password" id="confirmar" name="confirmar_senha" placeholder="Confirme a senha">
                    
                    <button type="submit">Cadastrar</button>

                    <p id="mensagem"></p>

                </form>
            </div>
            <div class="lado-foto">
                <img src="maisvoce_dois.jpg" alt="Foto" class="foto-lado">
            </div>
        </div>

    </div>
    <script src="presunto.js"></script>

</body>

</html>
